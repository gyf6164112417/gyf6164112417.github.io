<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司介绍</title>
    <style>
        @keyframes gradientBG {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

@keyframes textGradient {
    0% {
        background-position: 0% 50%;
    }
    100% {
        background-position: 100% 50%;
    }
}

@keyframes rotate3D {
    0% {
        transform: rotateY(0deg);
    }
    100% {
        transform: rotateY(360deg);
    }
}

body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    background-size: 200% 200%;
    animation: gradientBG 20s ease infinite;
    color: #333;
    position: relative;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}

header {
    text-align: center;
    padding: 3rem 0;
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0, 183, 255, 0.3);
    margin-bottom: 1.5rem;
    color: #fff;
    border: 1px solid rgba(0, 183, 255, 0.2);
    position: relative;
    overflow: hidden;
    will-change: transform;
}

.card {
    padding: 1.25rem;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(82, 190, 255, 0.2);
    transition: transform 0.3s ease;
    border: 1px solid rgba(82, 190, 255, 0.2);
    animation: fadeInUp 0.6s ease-out forwards;
    opacity: 0;
    will-change: transform, opacity;
}

@media (prefers-reduced-motion: reduce) {
    .card,
    body,
    header h1,
    header p {
        animation: none;
    }
    .card:hover {
        transform: none;
    }
}
body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.75);
    z-index: 0;
}

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        header {
            text-align: center;
            padding: 4rem 0;
            background-size: cover;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 183, 255, 0.4), 0 0 40px rgba(0, 183, 255, 0.2), 0 0 60px rgba(0, 183, 255, 0.1);
            margin-bottom: 2rem;
            color: #fff;
            border: 1px solid rgba(0, 183, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        header .logo-title {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            width: fit-content;
            gap: 0.1rem;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        header img {
            height: 5rem;
            width: auto;
            object-fit: contain;
            transition: transform 0.3s ease;
            animation: floatAnimation 3s ease-in-out infinite;
        }

        header .logo-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 0;
        }

        header {
            text-align: center;
            padding: 4rem 0;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 183, 255, 0.4), 0 0 40px rgba(0, 183, 255, 0.2), 0 0 60px rgba(0, 183, 255, 0.1);
            margin-bottom: 2rem;
            color: #333;
            border: 1px solid rgba(0, 183, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        header img:hover {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            header .logo-title {
                flex-direction: row;
            }
            header img {
                height: 2.5rem;
            }
        }

        @media (max-width: 480px) {
            header img {
                height: 2rem;
            }
        }
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 0;
        }

        header h1, header p {
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #00bfff, #0080ff, #1e90ff, #4169e1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGradient 5s ease infinite;
            margin-bottom: 1rem;
        }

        .content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 183, 255, 0.4), 0 0 40px rgba(0, 183, 255, 0.2);
            border: 1px solid rgba(0, 183, 255, 0.2);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatAnimation {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0);
            }
        }

        .card {
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(82, 190, 255, 0.3);
            transition: all 0.5s ease;
            border: 1px solid rgba(82, 190, 255, 0.2);
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }

        .card:nth-child(1) { animation-delay: 0.2s; }
        .card:nth-child(2) { animation-delay: 0.4s; }
        .card:nth-child(3) { animation-delay: 0.6s; }

        .card:hover {
            transform: perspective(1000px) rotateY(15deg) translateY(-10px) scale(1.05);
            box-shadow: 0 0 30px rgba(82, 190, 255, 0.6);
            border-color: rgba(82, 190, 255, 0.4);
        }

        .card h2 {
            background: linear-gradient(45deg, #00bfff, #0080ff, #1e90ff, #4169e1);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGradient 5s ease infinite;
        }

        .meeting-schedule tr {
            transition: all 0.3s ease;
        }

        .meeting-schedule tr:hover {
            background-color: rgba(82, 190, 255, 0.1);
            transform: scale(1.02) translateX(10px);
            box-shadow: 0 5px 15px rgba(82, 190, 255, 0.2);
        }

        header h1 {
            animation: textGradient 5s ease infinite, floatAnimation 3s ease-in-out infinite;
        }

        header p {
            animation: fadeInUp 1s ease-out forwards;
        }
        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 2rem;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 183, 255, 0.4);
            border: 1px solid rgba(0, 183, 255, 0.2);
            overflow-x: auto;
        }

        .meeting-schedule {
            margin: 2rem 0;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 183, 255, 0.4);
            border: 1px solid rgba(0, 183, 255, 0.2);
        }

        .meeting-schedule table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 1.5rem;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(82, 190, 255, 0.2);
        }

        .meeting-schedule th,
        .meeting-schedule td {
            padding: 1.2rem;
            text-align: left;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .meeting-schedule th {
            background: linear-gradient(45deg, rgba(82, 190, 255, 0.2), rgba(0, 123, 255, 0.2));
            color: #0066cc;
            font-weight: 600;
            border-bottom: 1px solid rgba(82, 190, 255, 0.2);
        }

        .meeting-schedule td {
            color: #333;
            border-bottom: 1px solid rgba(82, 190, 255, 0.1);
        }

        .meeting-schedule tr:hover {
            background-color: rgba(82, 190, 255, 0.1);
            transform: scale(1.01);
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            header {
                padding: 2rem 0;
            }
            h1 {
                font-size: 2rem;
            }
            .content {
                padding: 1rem;
                gap: 1rem;
            }
            .card {
                padding: 1rem;
                animation: fadeInUp 0.5s ease-out forwards;
            }
            .card:hover {
                transform: none;
                box-shadow: 0 0 15px rgba(82, 190, 255, 0.3);
            }
            .meeting-schedule {
                padding: 1rem;
                margin: 1rem 0;
            }
            .meeting-schedule th,
            .meeting-schedule td {
                padding: 0.8rem;
                font-size: 0.9rem;
            }
            .meeting-schedule tr:hover {
                transform: none;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }
            .card h2 {
                font-size: 1.4rem;
            }
            .meeting-schedule th,
            .meeting-schedule td {
                padding: 0.6rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-title">
                <img src="./企业logo.png" alt="国科智飞logo">
                <h1>国科智飞</h1>
            </div>
            <p>创新驱动未来，品质成就卓越</p>
        </header>

        <div class="content">
            <div class="card">
                <h2>关于我们</h2>
                <p>我们是一家致力于创新的科技公司，专注于为客户提供优质的解决方案。</p>
            </div>
            <div class="card">
                <h2>我们的服务</h2>
                <p>从软件开发到技术咨询，我们提供全方位的IT服务，助力企业数字化转型。</p>
            </div>
            <div class="card">
                <h2>联系我们</h2>
                <p>地址：北京市朝阳区XX路XX号<br>电话：010-12345678</p>
            </div>
        </div>

        <div class="meeting-schedule">
            <h2>会议时间表</h2>
            <table>
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>议程</th>
                        <th>主持人</th>
                        <th>地点</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>09:00 - 10:30</td>
                        <td>公司战略规划讨论</td>
                        <td>张总经理</td>
                        <td>主会议室</td>
                    </tr>
                    <tr>
                        <td>11:00 - 12:00</td>
                        <td>项目进度汇报</td>
                        <td>李经理</td>
                        <td>二号会议室</td>
                    </tr>
                    <tr>
                        <td>14:00 - 15:30</td>
                        <td>创新技术研讨会</td>
                        <td>王工程师</td>
                        <td>创新实验室</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <footer>
            <p>&copy; 2023 公司名称. 保留所有权利.</p>
        </footer>
    </div>
</body>
</html>
